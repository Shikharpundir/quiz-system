{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-5">
        <div class="card p-4 mb-4">
            <h3 class="mb-4">Add Question ➕</h3>
            <form method="POST">
                <input name="q" class="form-control mb-3" placeholder="Question Text">
                <div class="row g-2">
                    <div class="col-6"><input name="o1" class="form-control mb-2" placeholder="Option 1"></div>
                    <div class="col-6"><input name="o2" class="form-control mb-2" placeholder="Option 2"></div>
                    <div class="col-6"><input name="o3" class="form-control mb-2" placeholder="Option 3"></div>
                    <div class="col-6"><input name="o4" class="form-control mb-2" placeholder="Option 4"></div>
                </div>
                <input name="ans" class="form-control mt-2 mb-3" placeholder="Correct Answer">
                <button class="btn btn-custom w-100">Add to Quiz</button>
            </form>
        </div>

        <div class="card p-4 border-danger">
            <h4 class="text-danger">Danger Zone ⚠️</h4>
            <p class="small text-white-50">Use these with caution. These actions cannot be undone.</p>
            <div class="d-grid gap-2">
                <a href="/reset_results" class="btn btn-warning">Reset Leaderboard</a>
                <a href="/delete_quiz" class="btn btn-danger">Delete Entire Quiz</a>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card p-4">
            <h4 class="mb-4">Manage Questions ({{ questions|length }})</h4>
            <div class="question-list" style="max-height: 600px; overflow-y: auto;">
                {% for q in questions %}
                <div class="card p-3 mb-2 bg-dark-subtle border-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-truncate" style="max-width: 80%;">{{q[1]}}</span>
                        <a href="/delete_question/{{q[0]}}" class="btn btn-outline-danger btn-sm">
                            Delete
                        </a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
