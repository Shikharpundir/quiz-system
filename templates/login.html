{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center mb-4">Welcome Back</h3>

            <form method="POST" action="/login">
                <div class="mb-3">
                    <input name="email" class="form-control custom-input" placeholder="Email">
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control custom-input" placeholder="Password">
                </div>

                <button class="btn btn-custom w-100">Login</button>
            </form>

            <p class="text-center mt-3">
                <a href="/register" class="text-white-50">Create Account</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
