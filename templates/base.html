<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}SOPS QUIZ SYSTEM{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_styles %}{% endblock %}

    <style>
        @media (max-width: 576px) {
            .container {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>

<body>

    {% if not hide_navbar %}
    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <span style="font-size: 1.5rem;">🧠</span>
                {% block nav_title %}SOPS QUIZ SYSTEM{% endblock %}
            </a>
            
            {% if session.user_id %}
            <div class="d-flex align-items-center">
                <span class="navbar-text welcome-msg">
    👋 Welcome back, <span style="color: var(--secondary); font-weight: bold;">{{ session.name }}</span>
</span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
            {% endif %}
        </div>
    </nav>
    {% endif %}

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
